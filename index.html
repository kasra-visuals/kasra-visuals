document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

        <\u002Fbutton>\n        <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 24px;border:1px solid rgba(244,242,238,.24);border-radius:100px;font-size:15px;color:rgba(244,242,238,.85);transition:border-color .2s,color .2s\" style-hover=\"{{ ghostHover }}\">Start a project →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;max-width:1180px;margin:76px auto 0;width:100%;display:flex;flex-wrap:wrap;gap:56px;border-top:1px solid rgba(244,242,238,.1);padding-top:26px\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <div>\n          <div style=\"font-size:32px;font-weight:600;letter-spacing:-.01em\">{{ s.value }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;letter-spacing:.06em;color:rgba(244,242,238,.45);margin-top:4px\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- WORK -->\n  <section id=\"work\" style=\"padding:110px 40px;max-width:1260px;margin:0 auto\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:40px\">\n      <div>\n        <div style=\"font:12px/1 ui-monospace,Menlo,monospace;letter-spacing:.24em;color:var(--accent,#e0894a);margin-bottom:16px\">01 — SELECTED WORK<\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(34px,5vw,60px);font-weight:600;letter-spacing:-.02em;line-height:1\">Recent films<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px\">\n      <sc-for list=\"{{ items }}\" as=\"it\" hint-placeholder-count=\"6\">\n        <a href=\"#contact\" onmouseenter=\"{{ it.onEnter }}\" onmouseleave=\"{{ it.onLeave }}\" style=\"position:relative;display:block;border-radius:14px;overflow:hidden;aspect-ratio:16/10;background:repeating-linear-gradient(135deg,#17171a 0,#17171a 10px,#141416 10px,#141416 20px);border:1px solid rgba(244,242,238,.08)\">\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:11px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(244,242,238,.22)\">{{ it.ph }}<\u002Fdiv>\n          <div style=\"{{ it.zoomStyle }}\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,11,0) 40%,rgba(10,10,11,.88))\"><\u002Fdiv>\n          <div style=\"{{ it.playStyle }}\">\n            <span style=\"width:0;height:0;border-left:11px solid #0a0a0b;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:20px;right:20px;bottom:18px\">\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent,#e0894a);margin-bottom:6px\">{{ it.category }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px\">\n              <div style=\"font-size:20px;font-weight:600;letter-spacing:-.01em\">{{ it.client }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:rgba(244,242,238,.55);text-align:right\">{{ it.title }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CLIENTS / TESTIMONIALS -->\n  <section id=\"clients\" style=\"padding:100px 40px;background:#0d0d0f;border-top:1px solid rgba(244,242,238,.07);border-bottom:1px solid rgba(244,242,238,.07)\">\n    <div style=\"max-width:1260px;margin:0 auto\">\n      <div style=\"font:12px/1 ui-monospace,Menlo,monospace;letter-spacing:.24em;color:var(--accent,#e0894a);margin-bottom:16px\">02 — CLIENTS<\u002Fdiv>\n      <h2 style=\"margin:0 0 52px;font-size:clamp(34px,5vw,60px);font-weight:600;letter-spacing:-.02em;line-height:1;max-width:760px\">Trusted by brands who care how they show up.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px\">\n        <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <figure style=\"margin:0;display:flex;flex-direction:column;justify-content:space-between;gap:28px;padding:30px;border-radius:16px;background:rgba(244,242,238,.03);border:1px solid rgba(244,242,238,.08)\">\n            <blockquote style=\"margin:0;font-family:'Instrument Serif',serif;font-size:24px;line-height:1.35;color:#f4f2ee\">“{{ t.quote }}”<\u002Fblockquote>\n            <figcaption style=\"display:flex;align-items:center;gap:13px\">\n              <div style=\"width:42px;height:42px;border-radius:50%;flex:none;background:repeating-linear-gradient(135deg,#1e1e22 0,#1e1e22 5px,#191919 5px,#191919 10px);border:1px solid rgba(244,242,238,.1)\"><\u002Fdiv>\n              <div>\n                <div style=\"font-size:14.5px;font-weight:600\">{{ t.name }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:rgba(244,242,238,.5)\">{{ t.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"padding:110px 40px;max-width:1180px;margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start\">\n      <div style=\"min-width:0\">\n        <div style=\"font:12px/1 ui-monospace,Menlo,monospace;letter-spacing:.24em;color:var(--accent,#e0894a);margin-bottom:16px\">03 — CONTACT<\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(34px,5vw,64px);font-weight:600;letter-spacing:-.02em;line-height:1\">Let's make<br><span style=\"font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--accent,#e0894a)\">something.<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:400px;margin:26px 0 40px;font-size:16.5px;line-height:1.6;color:rgba(244,242,238,.6)\">Tell us about your brand and what you're trying to make. We reply to every serious inquiry within two business days.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:18px\">\n          <a href=\"mailto:hello@kasravisuals.com\" style=\"display:flex;align-items:center;gap:14px;font-size:16px\" style-hover=\"{{ navHover }}\">\n            <span style=\"font:11px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(244,242,238,.4);width:64px\">EMAIL<\u002Fspan>contact@kasravisuals.com\n          <\u002Fa>\n          <div style=\"display:flex;align-items:center;gap:14px;font-size:16px;color:rgba(244,242,238,.75)\">\n            <span style=\"font:11px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(244,242,238,.4);width:64px\">SOCIAL<\u002Fspan>\n            <span style=\"display:flex;gap:16px\">\n              <a href=\"https://www.instagram.com/kasravisuals/\" target=\"_blank\" rel=\"noopener\" style-hover=\"{{ navHover }}\">Instagram<\u002Fa>\n              <a href=\"#work\" style-hover=\"{{ navHover }}\">Vimeo<\u002Fa>\n              <a href=\"#work\" style-hover=\"{{ navHover }}\">LinkedIn<\u002Fa>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"min-width:0;padding:34px;border-radius:20px;background:rgba(244,242,238,.03);border:1px solid rgba(244,242,238,.09)\">\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:16px;padding:36px 8px;animation:kv-in .4s ease both\">\n            <div style=\"display:flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;background:var(--accent,#e0894a)\">\n              <span style=\"width:16px;height:9px;border-left:2.5px solid #0a0a0b;border-bottom:2.5px solid #0a0a0b;transform:rotate(-45deg);margin-top:-4px\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:24px;font-weight:600;letter-spacing:-.01em\">Message sent.<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:rgba(244,242,238,.6)\">Thanks — we've got your brief and will be in touch within two business days.<\u002Fp>\n            <button onclick=\"{{ resetForm }}\" style=\"margin-top:8px;padding:10px 20px;border:1px solid rgba(244,242,238,.24);border-radius:100px;background:none;color:#f4f2ee;font-size:14px;cursor:pointer\">Send another<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n              <label style=\"{{ labelStyle }}\">Name<input value=\"{{ form.name }}\" onchange=\"{{ setName }}\" required=\"\" placeholder=\"Your name\" style=\"{{ inputStyle }}\"><\u002Flabel>\n              <label style=\"{{ labelStyle }}\">Company<input value=\"{{ form.company }}\" onchange=\"{{ setCompany }}\" placeholder=\"Brand / company\" style=\"{{ inputStyle }}\"><\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"{{ labelStyle }}\">Email<input type=\"email\" value=\"{{ form.email }}\" onchange=\"{{ setEmail }}\" required=\"\" placeholder=\"you@brand.com\" style=\"{{ inputStyle }}\"><\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n              <label style=\"{{ labelStyle }}\">Project type<select value=\"{{ form.type }}\" onchange=\"{{ setType }}\" style=\"{{ inputStyle }}\">\n                <option style=\"color:#111\">Brand film<\u002Foption>\n                <option style=\"color:#111\">Product / launch<\u002Foption>\n                <option style=\"color:#111\">Social campaign<\u002Foption>\n                <option style=\"color:#111\">Documentary<\u002Foption>\n                <option style=\"color:#111\">Not sure yet<\u002Foption>\n              <\u002Fselect><\u002Flabel>\n              <label style=\"{{ labelStyle }}\">Budget<select value=\"{{ form.budget }}\" onchange=\"{{ setBudget }}\" style=\"{{ inputStyle }}\">\n                <option style=\"color:#111\">Under $10k<\u002Foption>\n                <option style=\"color:#111\">$10k – $25k<\u002Foption>\n                <option style=\"color:#111\">$25k – $50k<\u002Foption>\n                <option style=\"color:#111\">$50k+<\u002Foption>\n              <\u002Fselect><\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"{{ labelStyle }}\">About the project<textarea value=\"{{ form.message }}\" onchange=\"{{ setMessage }}\" rows=\"4\" placeholder=\"What are you making, and by when?\" style=\"{{ textareaStyle }}\"><\u002Ftextarea><\u002Flabel>\n            <button type=\"submit\" style=\"margin-top:6px;padding:16px;border:none;border-radius:100px;background:var(--accent,#e0894a);color:#0a0a0b;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s\" style-hover=\"{{ ctaHover }}\">Send inquiry →<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:48px 40px;border-top:1px solid rgba(244,242,238,.08);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;max-width:1260px;margin:0 auto\">\n    <div style=\"display:flex;align-items:center;gap:11px;font-weight:600;letter-spacing:.14em;font-size:15px\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:var(--accent,#e0894a)\"><\u002Fspan>KASRA VISUALS\n    <\u002Fdiv>\n    <div style=\"font-size:13px;color:rgba(244,242,238,.4)\">© 2026 Kasra Visuals — Commercial &amp; brand film studio<\u002Fdiv>\n    <a href=\"#top\" style=\"font-size:13px;color:rgba(244,242,238,.55)\" style-hover=\"{{ navHover }}\">Back to top ↑<\u002Fa>\n  <\u002Ffooter>\n\n  <!-- SHOWREEL MODAL -->\n  <sc-if value=\"{{ reelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeReel }}\" style=\"position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:40px;background:rgba(6,6,7,.86);backdrop-filter:blur(8px);animation:kv-in .28s ease both\">\n      <div style=\"position:relative;width:100%;max-width:1040px;aspect-ratio:16/9;border-radius:14px;overflow:hidden;border:1px solid rgba(244,242,238,.14);background:repeating-linear-gradient(135deg,#141416 0,#141416 12px,#111 12px,#111 24px)\">\n        <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font:12px/1 ui-monospace,Menlo,monospace;letter-spacing:.2em;color:rgba(244,242,238,.4)\">\n          <div style=\"width:64px;height:64px;border-radius:50%;background:var(--accent,#e0894a);display:flex;align-items:center;justify-content:center;animation:kv-pulse 2s ease-in-out infinite\">\n            <span style=\"width:0;height:0;border-left:20px solid #0a0a0b;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px\"><\u002Fspan>\n          <\u002Fdiv>\n          SHOWREEL PLACEHOLDER — DROP 2026 REEL HERE\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ closeReel }}\" style=\"position:absolute;top:28px;right:32px;width:44px;height:44px;border-radius:50%;border:1px solid rgba(244,242,238,.24);background:rgba(10,10,11,.6);color:#f4f2ee;font-size:20px;cursor:pointer\">✕<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#e0894a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#e0894a&quot;,&quot;#c9a24b&quot;,&quot;#6fa8b4&quot;,&quot;#b5615a&quot;,&quot;#e8e4dc&quot;],&quot;section&quot;:&quot;Style&quot;},&quot;grain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = {\n      filter: 'All',\n      hovered: null,\n      reelOpen: false,\n      submitted: false,\n      form: { name:'', company:'', email:'', type:'Brand film', budget:'$10k – $25k', message:'' }\n    };\n  }\n  applyAccent(){\n    const el = this.rootRef.current;\n    if (el) el.style.setProperty('--accent', this.props.accent || '#e0894a');\n  }\n  componentDidMount(){ this.applyAccent(); }\n  componentDidUpdate(){ this.applyAccent(); }\n\n  setField(k, v){ this.setState(s => ({ form: { ...s.form, [k]: v } })); }\n\n  renderVals(){\n    const accent = this.props.accent || '#e0894a';\n    const allItems = [\n      { id:1, client:'Aeris Athletic', category:'Commercial', title:'Spring campaign', ph:'16:9 · FILM STILL' },\n      { id:2, client:'Noir Atelier', category:'Fashion', title:'SS26 lookbook', ph:'16:9 · FILM STILL' },\n      { id:3, client:'Vantage OS', category:'Tech', title:'Product launch', ph:'16:9 · FILM STILL' },\n      { id:4, client:'Grove & Grain', category:'Food & Bev', title:'Founders story', ph:'16:9 · FILM STILL' },\n      { id:5, client:'Velar Motors', category:'Automotive', title:'EV reveal', ph:'16:9 · FILM STILL' },\n      { id:6, client:'Lumen Skincare', category:'Commercial', title:'Brand anthem', ph:'16:9 · FILM STILL' },\n    ];\n    const cats = ['All','Commercial','Fashion','Tech','Food & Bev','Automotive'];\n    const filterBase = 'padding:9px 16px;border-radius:100px;font-size:13px;letter-spacing:.02em;cursor:pointer;transition:all .2s;background:none';\n    const filters = cats.map(c => ({\n      name: c,\n      onClick: () => this.setState({ filter: c }),\n      style: c === this.state.filter\n        ? `${filterBase};border:1px solid ${accent};color:${accent}`\n        : `${filterBase};border:1px solid rgba(244,242,238,.16);color:rgba(244,242,238,.6)`\n    }));\n\n    const items = allItems\n      .filter(it => this.state.filter === 'All' || it.category === this.state.filter)\n      .map(it => {\n        const hov = this.state.hovered === it.id;\n        return {\n          ...it,\n          onEnter: () => this.setState({ hovered: it.id }),\n          onLeave: () => this.setState({ hovered: null }),\n          zoomStyle: `position:absolute;inset:0;background:radial-gradient(80% 80% at 50% 40%, ${accent}22, transparent 70%);opacity:${hov?1:0};transition:opacity .35s`,\n          playStyle: `position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;background:${accent};display:flex;align-items:center;justify-content:center;transform:scale(${hov?1:.6});opacity:${hov?1:0};transition:all .3s`\n        };\n      });\n\n    const labelStyle = 'display:flex;flex-direction:column;gap:8px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:rgba(244,242,238,.5)';\n    const inputStyle = 'padding:13px 14px;border-radius:10px;border:1px solid rgba(244,242,238,.14);background:rgba(10,10,11,.5);color:#f4f2ee;font-size:15px;outline:none';\n    const textareaStyle = inputStyle + ';resize:vertical;min-height:96px;font-family:inherit';\n\n    return {\n      rootRef: this.rootRef,\n      grain: this.props.grain !== false,\n      reelOpen: this.state.reelOpen,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      openReel: () => this.setState({ reelOpen: true }),\n      closeReel: () => this.setState({ reelOpen: false }),\n      navHover: { opacity: 1, color: accent },\n      ctaHover: { transform: 'translateY(-2px)' },\n      ghostHover: { borderColor: accent, color: accent },\n      stats: [\n        { value:'90+', label:'Films shipped' },\n        { value:'40M+', label:'Views delivered' },\n      ],\n      filters, items,\n      testimonials: [\n        { quote:'Kasra delivered a film that outperformed every paid asset we ran that quarter.', name:'Maya Chen', role:'Head of Brand, Vantage OS' },\n        { quote:'The set felt effortless and the final cut made our team cry. Rare combination.', name:'David Okafor', role:'Founder, Grove & Grain' },\n        { quote:'Fast, cinematic, and genuinely strategic about what the film needed to do.', name:'Lena Frost', role:'CMO, Velar Motors' },\n      ],\n      form: this.state.form,\n      labelStyle, inputStyle, textareaStyle,\n      setName: e => this.setField('name', e.target.value),\n      setCompany: e => this.setField('company', e.target.value),\n      setEmail: e => this.setField('email', e.target.value),\n      setType: e => this.setField('type', e.target.value),\n      setBudget: e => this.setField('budget', e.target.value),\n      setMessage: e => this.setField('message', e.target.value),\n      onSubmit: e => { e.preventDefault(); this.setState({ submitted: true }); },\n      resetForm: () => this.setState({ submitted: false, form: { name:'', company:'', email:'', type:'Brand film', budget:'$10k – $25k', message:'' } }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
